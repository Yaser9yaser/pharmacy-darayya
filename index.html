<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>صيدليات داريا الذكي 💊</title>

    <meta property="og:title" content="صيدليات داريا الذكي 💊">
    <meta property="og:description" content="دليل الصيدليات المناوبة في داريا - بحث ذكي وتحديث يومي.">
    <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/883/883356.png">
    <meta property="og:type" content="website">

    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/883/883356.png">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #2D9CDB;
            --mint-green: #27AE60;
            --bg-body: #F0F2F5;
            --bg-card: #FFFFFF;
            --text-main: #2C3E50;
            --text-light: #7F8C8D;
            --border-color: #E0E0E0;
            --red-alert: #e74c3c;
        }

        .dark-mode {
            --bg-body: #121212;
            --bg-card: #1E1E1E;
            --text-main: #ECF0F1;
            --text-light: #BDC3C7;
            --border-color: #333333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: 0.3s;
        }

        .emergency-bar {
            background: var(--red-alert);
            color: white;
            text-align: center;
            padding: 8px;
            font-weight: bold;
            font-size: 14px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--bg-card);
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
        }

        .header {
            background: linear-gradient(135deg, var(--primary-blue), #1a7fb8);
            color: white;
            padding: 30px 15px;
            text-align: center;
            border-bottom: 5px solid var(--mint-green);
            position: relative;
        }

        .dark-toggle {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            padding: 8px;
            border-radius: 50%;
            cursor: pointer;
        }

        .pharmacy-item {
            border-right: 5px solid var(--primary-blue);
            margin: 15px;
            padding: 15px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .name {
            font-size: 19px;
            font-weight: 900;
            color: var(--primary-blue);
            margin-bottom: 5px;
        }

        .address {
            font-size: 14px;
            color: var(--text-light);
        }

        .btn-main {
            background: var(--primary-blue);
            width: calc(100% - 30px);
            margin: 15px;
            display: block;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            font-weight: bold;
            border: none;
            font-family: 'Cairo';
            cursor: pointer;
        }

        .search-section {
            display: none;
            padding: 15px;
            background: var(--bg-body);
            margin: 0 15px 15px;
            border-radius: 10px;
        }

        .search-section.active {
            display: block;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-bottom: 10px;
            font-family: 'Cairo';
            font-size: 14px;
        }

        .footer {
            padding: 30px 20px;
            text-align: center;
            font-size: 13px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-card);
        }
    </style>
</head>

<body>

    <div class="emergency-bar">🚨 طوارئ الدفاع المدني (داريا): 0965970048</div>

    <div class="container">
        <div class="header">
            <button class="dark-toggle" onclick="toggleDarkMode()" id="themeBtn">🌙</button>
            <h1>💊 صيدليات داريا</h1>
            <div id="displayDate"
                style="margin-top:10px; font-weight:bold; background: var(--mint-green); display: inline-block; padding: 2px 12px; border-radius: 15px;">
            </div>
        </div>

        <div id="todayDuty">
            <h2 style="text-align:center; margin-top:20px; color:var(--mint-green)">🗓️ مناوبة اليوم</h2>
            <div id="todayList"></div>
            <button class="btn-main" style="background:#25D366" onclick="shareToday()">📱 شارك مناوبة اليوم</button>
        </div>

        <button class="btn-main" onclick="toggleSearch()">🔍 محرك البحث والجدول الكامل</button>

        <div class="search-section" id="searchArea">
            <input type="text" id="nameInput" oninput="searchByName()"
                placeholder="ابحث باسم الصيدلية (مثلاً: روضة)...">
            <select id="dateSelect" onchange="searchByDate()"></select>
            <div id="searchResults"></div>
        </div>

        <div class="footer">
            <p>🕊️ إهداء لأرواح شهداء داريا</p>
            <p style="font-weight:bold; color:var(--primary-blue); margin-top:5px; font-size:16px;">Yaser Jamal Al-Deen
            </p>
            <p style="margin-top:15px; color:var(--text-light);">يتم التحديث تلقائياً بناءً على جدول نيسان 2026</p>
        </div>
    </div>

    <script>
        const PHARMACIES_DB = {
            "علي الأحمر": { address: "قبل جامع العباس من جهة شارع الثورة" },
            "غسان عزيزية": { address: "قرب ماركت البيان" },
            "فراس": { address: "شارع الثورة مقابل محمصة داريا" },
            "الرضوان": { address: "قرب الباب القبلي لجامع طه" },
            "روضة عبود": { address: "شارع الوحدة - مقابل طاحونة حنا" },
            "فايز كحلوس": { address: "مقابل المخفر" },
            "هنادي محمد": { address: "مقابل محلات الوزير" },
            "وعد أبو بكر": { address: "آخر شارع الثورة مقابل الكنيسة" },
            "محمود خولاني": { address: "ساحة الأوقاف - امتداد شارع الثانوية" },
            "خلود العزب": { address: "شارع المعضمية بناء العزب" },
            "محمد السعدي": { address: "موقف النكاشات" },
            "باري أبو زيدان": { address: "مقابل المستوصف تماماً" },
            "هند زرقة": { address: "شارع الوحدة قرب جامع المصطفى" },
            "محمود المنيع": { address: "بجانب المركز الثقافي" },
            "محمد تيسير معاني": { address: "شارع الثورة تقاطع فريد اللحام" },
            "عدنان نجبية": { address: "الشاميات بناء المغربي" },
            "الأيوبي": { address: "شارع الثورة مقابل الطابو" },
            "سيف الدين حافظ": { address: "شارع الشهداء خلف مشفى الرضوان" },
            "خالد أبو حلمي": { address: "شارع الشهداء مقابل مغسل الخولاني" },
            "دعاء": { address: "أول طريق المعضمية" },
            "داريا النموذجية": { address: "مقابل الثانوية الشرعية" },
            "سهام كساح": { address: "بداية شارع الشهداء" },
            "الشربجي": { address: "ساحة شريدي" }
        };

        const SCHEDULE = {
            1: ["روضة عبود", "فايز كحلوس"], 2: ["علي الأحمر", "هنادي محمد"], 4: ["فراس", "الرضوان"],
            6: ["وعد أبو بكر", "خلود العزب"], 7: ["محمود خولاني", "محمود المنيع"], 8: ["محمد السعدي", "باري أبو زيدان"],
            9: ["محمد تيسير معاني", "سيف الدين حافظ"], 11: ["الأيوبي", "هند زرقة"], 13: ["غسان عزيزية", "خالد أبو حلمي"],
            14: ["عدنان نجبية", "روضة عبود"], 15: ["فايز كحلوس", "علي الأحمر"], 16: ["هنادي محمد", "وعد أبو بكر"],
            18: ["محمود خولاني", "خلود العزب"], 20: ["فراس", "الرضوان"], 21: ["محمد السعدي", "باري أبو زيدان"],
            22: ["هند زرقة", "محمود المنيع"], 23: ["محمد تيسير معاني", "عدنان نجبية"], 25: ["الأيوبي", "سيف الدين حافظ"],
            27: ["غسان عزيزية", "خالد أبو حلمي"], 28: ["روضة عبود", "فايز كحلوس"], 29: ["علي الأحمر", "هنادي محمد"], 30: ["فراس", "الرضوان"]
        };

        const FRIDAY_TEAM = ["فراس", "دعاء", "داريا النموذجية", "محمد السعدي", "باري أبو زيدان", "سهام كساح", "الشربجي", "محمود المنيع"];

        function normalize(t) { return t.replace(/[أإآا]/g, 'ا').replace(/[ةه]/g, 'ه').trim(); }

        function getDuty(d) {
            const dt = new Date(2026, 3, d); // نيسان
            if (dt.getDay() === 5) return FRIDAY_TEAM;
            return SCHEDULE[d] || ["يرجى مراجعة الجدول الورقي"];
        }

        function renderPharmacy(name) {
            const info = PHARMACIES_DB[name] || { address: "العنوان متاح في الجدول" };
            return `<div class="pharmacy-item"><div class="name">💊 ${name}</div><div class="address">📍 ${info.address}</div></div>`;
        }

        function init() {
            const now = new Date();
            const d = (now.getHours() < 2) ? now.getDate() - 1 : now.getDate();
            document.getElementById('displayDate').textContent = `${d} / 4 / 2026`;
            document.getElementById('todayList').innerHTML = getDuty(d).map(renderPharmacy).join('');

            const select = document.getElementById('dateSelect');
            for (let i = 1; i <= 30; i++) {
                const opt = document.createElement('option');
                opt.value = i; opt.textContent = `يوم ${i} نيسان`;
                if (i === d) opt.selected = true;
                select.appendChild(opt);
            }
            if (localStorage.getItem('theme') === 'dark') toggleDarkMode();
        }

        function toggleSearch() { document.getElementById('searchArea').classList.toggle('active'); }

        function searchByName() {
            const q = normalize(document.getElementById('nameInput').value);
            const res = Object.keys(PHARMACIES_DB).filter(n => normalize(n).includes(q));
            document.getElementById('searchResults').innerHTML = res.map(renderPharmacy).join('');
        }

        function searchByDate() {
            const d = parseInt(document.getElementById('dateSelect').value);
            document.getElementById('searchResults').innerHTML = getDuty(d).map(renderPharmacy).join('');
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            const isDark = document.body.classList.contains('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
        }

        function shareToday() {
            const now = new Date();
            const d = (now.getHours() < 2) ? now.getDate() - 1 : now.getDate();
            const text = `💊 صيدليات داريا المناوبة لليوم ${d}/4:\n` + getDuty(d).join('\n') + `\nرابط الموقع: ` + window.location.href;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
        }

        init();
    </script>
</body>

</html>
