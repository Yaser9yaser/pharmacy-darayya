  --green: #10b981;

  --red: #ef4444;

  --card: rgba(255,255,255,0.75);
  --glass: rgba(255,255,255,0.5);
  --txt: #0f172a;
  --muted: #64748b;
  --border: rgba(14,165,233,0.15);
  --sh: 0 8px 40px rgba(14,165,233,0.13);
  --radius: 22px;
}
.dark {

  --glass: rgba(15,23,42,0.6);
  --txt: #e2e8f0;
  --muted: #94a3b8;

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--txt);
  min-height: 100vh;
  transition: background .5s, color .4s;
  line-height: 1.7;
  overflow-x: hidden;
}

/* ── BACKGROUND ─────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:

    radial-gradient(ellipse at 80% 80%, rgba(139,92,246,0.1) 0%, transparent 55%),

  pointer-events: none;
  z-index: 0;
}
body.dark::before {
  background:

}

/* ── FLOATING ORBS ──────────────────────────── */
.orbs {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(60px);
  opacity: 0.35;
  animation: drift 12s ease-in-out infinite;
}
.orb1 { width: 250px; height: 250px; background: var(--primary); top: -80px; right: -60px; animation-delay: 0s; }
.orb2 { width: 200px; height: 200px; background: var(--accent); bottom: 100px; left: -70px; animation-delay: -4s; }
.orb3 { width: 150px; height: 150px; background: var(--green); bottom: -40px; right: 30%; animation-delay: -7s; }
body.dark .orb { opacity: 0.18; }

@keyframes drift {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-20px) scale(1.05); }
}

/* ── EMERGENCY BAR ──────────────────────────── */
.emr {
  position: relative;
  z-index: 100;
  background: linear-gradient(90deg, #dc2626, #b91c1c, #991b1b);
  color: #fff;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 13.5px;
  font-weight: 700;
  box-shadow: 0 3px 16px rgba(220,38,38,0.45);
}
.pulse { animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:.35} }
.emr-btns { display: flex; gap: 8px; }
.emr-btn {

  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;

  align-items: center;

.emr-btn:hover { transform: scale(1.07); box-shadow: 0 4px 12px rgba(0,0,0,.25); }
.emr-btn.c { background: rgba(255,255,255,.2); border: 1px solid rgba(255,255,255,.4); }
.emr-btn.w { background: var(--wa); }

.wrap {

.card {

}

/* ── HEADER ─────────────────────────────────── */

}
.hdr::before {
  content: '';
  position: absolute;
  top: -60%;
  left: -30%;
  width: 160%;
  height: 160%;
  background: radial-gradient(circle at 40% 40%, rgba(255,255,255,.14) 0%, transparent 55%);
  animation: spin 10s linear infinite;
}
.hdr::after {
  content: '';
  position: absolute;
  bottom: -1px;
  left: 0;
  right: 0;
  height: 30px;
  background: var(--bg);
  clip-path: ellipse(55% 100% at 50% 100%);
  transition: background .5s;
}
body.dark .hdr::after { background: var(--bg); }
@keyframes spin { to { transform: rotate(360deg); } }
.hdr-inner { position: relative; z-index: 1; }
.hdr-pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(255,255,255,.18);
  border: 1px solid rgba(255,255,255,.32);
  color: rgba(255,255,255,.92);
  padding: 3px 14px;
  border-radius: 20px;

  font-weight: 600;
  margin-bottom: 10px;
  letter-spacing: .3px;
}
.hdr-icon {

}
.hdr h1 {

  font-weight: 900;

.ph-btn {

/* ── ACTION BUTTONS ─────────────────────────── */
.action-grp { padding: 6px 12px 16px; display: flex; flex-direction: column; gap: 10px; }
.main-btn {

  padding: 14px;

  font-weight: 700;

  justify-content: center;
  gap: 9px;

  overflow: hidden;
}
.main-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0);
  transition: background .2s;
}
.main-btn:hover::after { background: rgba(255,255,255,.08); }
.main-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.22); }

.btn-shr { background: linear-gradient(135deg, #128c7e, var(--wa)); }
.btn-srch { background: linear-gradient(135deg, var(--primary), var(--accent)); }

/* ── SEARCH ─────────────────────────────────── */
.srch-box { display: none; padding: 16px; border-top: 1px solid var(--border); animation: slideIn .3s ease; }
.srch-box.on { display: block; }
@keyframes slideIn { from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)} }
.srch-lbl {
  font-size: 13px;
  font-weight: 700;
  color: var(--muted);
  margin-bottom: 7px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.srch-in, .srch-sel {
  width: 100%;
  padding: 12px 15px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--txt);
  font-family: 'Cairo', sans-serif;
  font-size: 14px;
  margin-bottom: 14px;
  outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.srch-in:focus, .srch-sel:focus {
  border-color: var(--primary);

/* ── EMPTY STATE ────────────────────────────── */
.empty { text-align: center; padding: 30px 20px; color: var(--muted); }

/* ── FOOTER ─────────────────────────────────── */

.footer-dedicaion {

/* ── DIVIDER ────────────────────────────────── */
.divider {

@keyframes fadeUp { from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)} }
.fade-in { animation: fadeUp .4s cubic-bezier(.34,1.2,.64,1); }

@media(max-width:380px){.hdr h1{font-size:21px}.emr{font-size:12px}}

const FRIDAY = ["فراس","دعاء","داريا النموذجية","محمد السعدي",
                "هلا الحوراني","إسراء سيلة","باري أبو زيدان",
                "سهام كساح","الشربجي","محمود المنيع"];

// ── قاعدة بيانات الصيدليات ───────────────────────
const DB = {
  "علي الأحمر":         {addr:"قبل جامع العباس من جهة شارع الثورة",      ph:"",map:"https://www.google.com/maps?q=33.458221,36.235406"},
  "غسان عزيزية":        {addr:"قرب ماركت البيان",                         ph:"",map:"https://www.google.com/maps?q=33.461602,36.234544"},
  "فراس":               {addr:"شارع الثورة - مقابل المحمصة",              ph:"",map:""},
  "الرضوان":            {addr:"قرب جامع طه",                               ph:"",map:""},
  "روضة عبود":          {addr:"شارع الوحدة - مقابل طاحونة حنا (جانب جامع الرحمن)", ph:"",map:""},
  "فايز كحلوس":         {addr:"مقابل المخفر",                             ph:"",map:""},
  "هنادي محمد":         {addr:"مقابل محلات الوزير",                       ph:"",map:""},
  "وعد أبو بكر":        {addr:"آخر شارع الثورة مقابل الكنيسة",            ph:"",map:""},

  "باري أبو زيدان":     {addr:"مقابل المستوصف تماماً",                    ph:"",map:""},
  "هند زرقة":           {addr:"شارع الوحدة قرب جامع المصطفى",            ph:"",map:""},
  "محمود المنيع":       {addr:"شارع المعضمية - بجانب المركز الثقافي",    ph:"",map:""},
  "محمد تيسير معاني":   {addr:"شارع الثورة - تقاطع فريد اللحام",         ph:"",map:""},
  "عدنان نجبية":        {addr:"الشاميات - بناء المغربي",                  ph:"",map:""},
  "الأيوبي":            {addr:"شارع الثورة مقابل الطابو",                 ph:"",map:""},
  "سيف الدين حافظ":     {addr:"شارع الشهداء خلف مشفى الرضوان",           ph:"",map:""},
  "خالد أبو حلمي":      {addr:"شارع الشهداء - مقابل مغسل الخولاني",      ph:"",map:""},
  "دعاء":               {addr:"أول طريق المعضمية",                        ph:"",map:""},
  "داريا النموذجية":    {addr:"مقابل الثانوية الشرعية تماماً",            ph:"",map:""},
  "هلا الحوراني":       {addr:"العنوان متاح في الجدول الورقي",            ph:"",map:""},
  "إسراء سيلة":         {addr:"العنوان متاح في الجدول الورقي",            ph:"",map:""},
  "سهام كساح":          {addr:"الكورنيش - مقابل الكاريدور",               ph:"",map:""},
  "الشربجي":            {addr:"ساحة شريدي",                               ph:"",map:""}

// ── ثوابت ────────────────────────────────────────
const DAYS   = ["الأحد","الاثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];
const MONTHS = ["كانون الثاني","شباط","آذار","نيسان","أيار","حزيران","تموز","آب","أيلول","تشرين الأول","تشرين الثاني","كانون الأول"];
const SITE   = "https://pharmacy-daraia.vercel.app";

// ── مساعدات ──────────────────────────────────────
function norm(s){
  return s.replace(/[أإآا]/g,'ا').replace(/[ةه]/g,'ه').replace(/[يى]/g,'ي').trim().toLowerCase();
}

function effectiveDate(){
  const n=new Date(); if(n.getHours()<2) n.setDate(n.getDate()-1); return n;
}

function getDuty(d,m,y){
  const dt=new Date(y,m-1,d), dow=dt.getDay();
  if(dow===5) return FRIDAY.slice();
  if(dow===0) return Object.keys(DB).filter(n=>!FRIDAY.includes(n));
  return (SCHEDULE[d]||[]).slice();
}

function card(name, days=null){
  const info=DB[name]||{addr:"راجع الجدول الورقي",ph:"",map:""};
  const btns=(info.ph||info.map)?`<div class="ph-actions">
    ${info.ph?`<a href="tel:${info.ph}" class="ph-btn call"><i class="fa fa-phone"></i> اتصال</a>`:''}
    ${info.map?`<a href="${info.map}" target="_blank" class="ph-btn map"><i class="fa fa-map-marker-alt"></i> خريطة</a>`:''}
  </div>`:'';
  const sched=days&&days.length?`<div class="sched-tags">
    <div class="sched-label"><i class="fa fa-calendar-check"></i> مناوبات الشهر (${days.length}):</div>
    <div class="sched-wrap">${days.sort((a,b)=>a-b).map(d=>`<span class="sched-tag">يوم ${d}</span>`).join('')}</div>
  </div>`:'';
  return `<div class="ph-card fade-in">
    <div class="ph-name"><i class="fa fa-pills"></i> ${name}</div>
    <div class="ph-addr"><i class="fa fa-map-pin"></i> ${info.addr}</div>
    ${sched}${btns}
  </div>`;
}

function empty(msg){return`<div class="empty"><i class="fa fa-search"></i><p>${msg}</p></div>`;}

// ── التهيئة ───────────────────────────────────────
function init(){
  const eff=effectiveDate(), d=eff.getDate(), m=eff.getMonth(), y=eff.getFullYear();
  document.getElementById('displayDate').textContent=`${DAYS[eff.getDay()]} ${d} ${MONTHS[m]} ${y}`;

  const list=document.getElementById('todayList');
  if(m+1!==MONTH||y!==YEAR){
    list.innerHTML=`<div class="empty"><i class="fa fa-info-circle"></i><p>هذا النظام محدث لشهر ${MONTHS[MONTH-1]} ${YEAR} فقط.</p></div>`;
  } else {
    const duty=getDuty(d,MONTH,YEAR);
    if(!duty.length){list.innerHTML=empty('لا توجد بيانات مناوبة لهذا اليوم.');}
    else{
      const sun=eff.getDay()===0?`<div class="sun-badge"><i class="fa fa-store"></i> يوم الأحد المفتوح — تعمل ${duty.length} صيدلية</div>`:'';
      list.innerHTML=sun+duty.map(n=>card(n)).join('');
    }
  }

  // القائمة المنسدلة
  const sel=document.getElementById('dateSelect');
  const total=new Date(YEAR,MONTH,0).getDate();
  sel.innerHTML='<option value="">— اختر يوماً —</option>';
  for(let i=1;i<=total;i++){
    const dt2=new Date(YEAR,MONTH-1,i), dow=dt2.getDay();
    const pre=dow===5?'🟢 الجمعة | ':dow===0?'🔵 الأحد | ':'';
    const o=document.createElement('option');
    o.value=i; o.textContent=`${pre}${DAYS[dow]} ${i} ${MONTHS[MONTH-1]}`;
    if(i===d) o.selected=true;
    sel.appendChild(o);
  }

  applyTheme();
  localStorage.setItem('ph_visits',(parseInt(localStorage.getItem('ph_visits')||0)+1)+'');
}

// ── البحث ─────────────────────────────────────────
function toggleSearch(){document.getElementById('srchBox').classList.toggle('on');}

function searchByName(){
  const q=norm(document.getElementById('nameInput').value);
  const res=document.getElementById('srchResults');
  if(!q){res.innerHTML='';return;}
  const total=new Date(YEAR,MONTH,0).getDate();
  const found={};
  Object.keys(DB).forEach(n=>{if(norm(n).includes(q)||norm(DB[n].addr).includes(q)) found[n]=[];});
  for(let d=1;d<=total;d++) getDuty(d,MONTH,YEAR).forEach(n=>{if(found[n]&&!found[n].includes(d)) found[n].push(d);});
  if(!Object.keys(found).length){res.innerHTML=empty(`لا نتائج لـ "${document.getElementById('nameInput').value}"`);return;}
  res.innerHTML=Object.keys(found).map(n=>card(n,found[n])).join('');
}

function searchByDate(){
  const d=parseInt(document.getElementById('dateSelect').value);
  const res=document.getElementById('srchResults');
  if(!d){res.innerHTML='';return;}
  const duty=getDuty(d,MONTH,YEAR);
  const dt=new Date(YEAR,MONTH-1,d);
  const sun=dt.getDay()===0?`<div class="sun-badge"><i class="fa fa-store"></i> الأحد المفتوح — ${duty.length} صيدلية</div>`:'';
  res.innerHTML=duty.length?sun+duty.map(n=>card(n)).join(''):empty('لا توجد بيانات لهذا اليوم.');
}

// ── الوضع الليلي ─────────────────────────────────
function applyTheme(){
  const saved=localStorage.getItem('theme');
  const h=new Date().getHours();
  const dark=saved?saved==='dark':(h>=19||h<6);
  setDark(dark);
}
function setDark(on){
  document.body.classList.toggle('dark',on);
  document.querySelector('#themeBtn i').className=on?'fa fa-sun':'fa fa-moon';
}
function toggleTheme(){
  const on=document.body.classList.toggle('dark');
  document.querySelector('#themeBtn i').className=on?'fa fa-sun':'fa fa-moon';
  localStorage.setItem('theme',on?'dark':'light');
}

// ── المشاركة ─────────────────────────────────────
async function shareToday(){
  const eff=effectiveDate(), d=eff.getDate();
  const duty=getDuty(d,MONTH,YEAR);
  let t=`💊 *الصيدليات المناوبة في داريا*\n🗓️ ${DAYS[eff.getDay()]} ${d} ${MONTHS[MONTH-1]} ${YEAR}\n${'─'.repeat(28)}\n\n`;
  duty.forEach((n,i)=>{const info=DB[n]||{};t+=`${i+1}. 💊 *${n}*\n${info.addr?`   📍 ${info.addr}\n`:''}\n`;});
  t+=`${'─'.repeat(28)}\n🌐 ${SITE}`;
  await doShare('الصيدليات المناوبة - داريا',t.trim());
}
async function shareSite(){
  await doShare('صيدليات داريا',`📱 تطبيق صيدليات داريا الذكي\nابحث بسهولة عن الصيدلية المناوبة:\n\n🔗 ${SITE}`);
}
async function doShare(title,text){
  if(navigator.share){try{await navigator.share({title,text});}catch(e){wb(text);}}else{wb(text);}
}
function wb(t){window.open(`https://wa.me/?text=${encodeURIComponent(t)}`,'_blank');}

init();
</script>
